<VirtualHost *:80>
    DocumentRoot /var/www/public

    # PHP endpoints (bewerben.php, mcp.php, go.php …) direkt aus current/static/
    AliasMatch "^/((?!index\.php)[^/]+\.php)$" "/var/www/current/static/$1"

    # Client CSS/JS/fonts/pictures — compiled by dart-sass, live-reloaded by watcher
    Alias /_resources /var/www/current/static/_resources

    # Bootstrap dist — served from CMS submodule, shared across all clients
    Alias /_bootstrap /var/www/cms/bootstrap/dist

    # CMS UI assets (editor JS, live-reload worker client) — will live in cms/
    # Alias /_ecms_resources /var/www/cms/_ecms_resources

    <Directory /var/www>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>
